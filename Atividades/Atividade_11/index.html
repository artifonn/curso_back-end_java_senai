<!doctype html>
<html lang="pt-br">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="CSS/estilo.css" type="text/css" media="all" rel="stylesheet">

</head>

<body>

    <!-- PARTE DE CIMA -->
    <nav class="navbar fixed-top navbar-dark bg-danger border-dark shadow-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Calculando seu IMC</a>
        </div>
    </nav>

    <!-- PARTE DO MEIO -->
    <main class="marginTop">
        <div class="container">
            <h1>Vamos calcular seu IMC</h1>
            <hr>

            <form action="">
                <div class="row">

                    <div class="col-12 col-md-4">
                        <label for="nome" class="form-label">Nome: </label>
                        <input type="text" class="form-control" id="nome" name="nome" placeholder="informe seu nome">
                    </div>


                    <div class="col-12 col-md-4">
                        <label for="idade" class="form-label">Idade: </label>
                        <input type="number" class="form-control" id="idade" name="idade" placeholder="informe sua idade">
                    </div>

                    <div class="col-12 col-md-4">
                        <label for="altura" class="form-label">Altura: </label>
                        <input type="number" class="form-control"  id="altura" name="altura" placeholder="informe sua altura" step="0.01">
                    </div>
                    <div class="col-12 col-md-8">
                        <label for="peso" class="form-label">Peso: </label>
                        <input type="number" class="form-control"  id="peso" name="peso" placeholder="informe seu peso">
                    </div>



                    <div class="mt-4 col-12 col-md-4 d-grid gap-2 d-md-flex justify-content-md-end">
                        <button class="btn btn-primary me-md-2" type="submit">Calcular</button>

                    </div>

                </div>

            </form>

        </div>




    </main>

    <div class="container text-center mt-5">
        <div class="row">
            <div class="col-12 col-md-12">
                <h4 id="result"></h4>
            </div>
        </div>
         
    </div>

   




    <script src="js/script.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
