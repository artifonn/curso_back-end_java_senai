<!doctype html>
<html lang="pt-br">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="CSS/estilo.css" type="text/css" media="all" rel="stylesheet">

</head>

<body>

    <nav class="navbar fixed-top navbar-dark bg-danger border-dark shadow-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Calculando seu IMC</a>
        </div>
    </nav>
    

    <main class="marginTop">
        <div class="container">
            <h1>Vamos calcular seu IMC</h1>
            <hr>

            <form action="">
                <div class="row">

                    <div class="col-12 col-md-4">
                        <label for="nome" class="form-label" id="nome">Nome: </label>
                        <input type="text" class="form-control" id="nome" placeholder="informe seu nome">
                    </div>

                    
                    <div class="col-12 col-md-4">
                        <label for="nome" class="form-label" id="nome">Idade: </label>
                        <input type="text" class="form-control" id="nome" placeholder="informe seu nome">
                    </div>

                    <div class="col-12 col-md-4">
                        <label for="nome" class="form-label" id="nome">Altura: </label>
                        <input type="number" class="form-control" id="nome" placeholder="informe seu nome">
                    </div>


                    
                    
                </div>

            </form>

        </div>
        


    </main>






    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
