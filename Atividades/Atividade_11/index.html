<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

	<title>Calculadora IMC</title>
</head>
<body>
	<main class="mt-5">
		<div class="container">
			<h1>Calculadora IMC</h1>
			<form action="" class="mt-5">
				<div class="col-12 col-md-6 col-lg-6 mb-3">
					<label for="nome" class="form-label">Nome:</label>
					<input id="nome" class="form-control" type="text" placeholder="João D" aria-label="nome">
				</div>
				<div class="col-12 col-md-6 col-lg-4 mb-3">
					<label for="peso" class="form-label">Peso:</label>
					<input class="form-control" type="text" placeholder="83.00" aria-label="peso">
				</div>
				<div class="col-12 col-md-4 col-lg-4 mb-3">
					<label for="altura" class="form-label">Altura:</label>
					<input class="form-control" type="text" placeholder="1.80" aria-label="altura">
				</div>
				<div class="d-flex justify-content-start">
					<button id="botao" type="submit" class="btn btn-primary" style="width: 10%">Calcular</button>
				</div>
			</form>
			<h2 id="result"></h2>
		</div>
	</main>

	<script src="./src/script.js"></script>
</body>

</html>
