<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Mascara de entrada</title>
</head>

<body style="padding: 30px 100px; font-family: Arial, Helvetica, sans-serif;">
	<h1>Máscara de entrada</h1>

	<form method="">
		<label for="nome">Nome: </label><br>
		<input type="text" id="nome" required placeholder="Digite seu nome"><br><br>
		<label for="cpf">CPF: </label><br>
		<input type="text" id="cpf" required placeholder="Digite seu cpg"><br><br>
		<label for="telefone">Telefone: </label><br>
		<input type="tel" id="telefone" required placeholder="Digite seu Telefone"><br><br>
		<label for="cep">CEP: </label><br>
		<input type="text" id="cep" required placeholder="Digites seu CEP"><br><br>
		<button type="submit">Enviar</button>

	</form>

	<h3 id="result"></h3>

	<script src="./src/script.js"></script>

</body>

</html>
