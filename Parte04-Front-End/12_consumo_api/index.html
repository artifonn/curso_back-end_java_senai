<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  </head>
  <body >
    <div class="container mt-5">
        <h1>Formulário com API</h1>
        <hr>
        <form method="" class="mt-5 bg-light p-4 rounded shadow-sm" >
            <div class="row">
                <div class="col-12 col-md-6 col-lg-6 mb-3">
                    <label for="nome" class="form-label">Nome: </label>
                    <input type="text" class="form-control" id="nome" required placeholder="Digite seu nome">
                </div>
                <div class="col-12 col-md-6 col-lg-6 mb-3">
                    <label for="email" class="form-label">Email: </label>
                    <input type="email" class="form-control" id="email" required placeholder="Digite seu email">
                </div>
                <div class="col-12 col-md-4 col-lg-4 mb-3">
                    <label for="cpf" class="form-label">CPF: </label>
                    <input type="text" class="form-control" id="cpf" required placeholder="Digite seu cpf">
                </div>
                <div class="col-12 col-md-4 col-lg-4  mb-3">
                    <label for="telefone" class="form-label">Telefone:</label>
                    <input type="text" class="form-control" id="telefone" required placeholder="Digite seu cep">
                </div>
                <div class="col-12 col-md-4 col-lg-4  mb-3">
                    <label for="cep" class="form-label">CEP:</label>
                    <input type="text" class="form-control" id="cep" required placeholder="Digite seu cep">
                </div>
                <div class="col-12 col-md-4 col-lg-3  mb-3">
                    <label for="estado" class="form-label">Estado:</label>
                    <input type="text" class="form-control" id="estado" required placeholder="Digite seu estado">
                </div>
                <div class="col-12 col-md-4 col-lg-3 mb-3">
                    <label for="cidade" class="form-label">Cidade:</label>
                    <input type="text" class="form-control" id="cidade" required placeholder="Digite seu cidade">
                </div>
                <div class="col-12 col-md-4 col-lg-3  mb-3">
                    <label for="bairro" class="form-label">Bairro:</label>
                    <input type="text" class="form-control" id="bairro" required placeholder="Digite seu bairro">
                </div>
                <div class="col-12 col-md-8 col-lg-3 mb-3">
                    <label for="logradouro" class="form-label">logradouro:v</label>
                    <input type="text" class="form-control" id="logradouro" required placeholder="Digite seu logradouro">
                </div>
                <div class="col-12 col-md-3 col-lg-3 mb-3">
                    <label for="numero" class="form-label">número:</label>
                    <input type="text" class="form-control" id="numero" required placeholder="Digite o numero">
                </div>
                <div class="col-12 col-lg-9 mb-3">
                    <label for="complemento" class="form-label">Complemento:</label>
                    <input type="text" class="form-control" id="complemento" placeholder="Complemento">
                </div>
                <div class="d-flex justify-content-end mt-5">
                    <button type="submit" class="btn btn-primary">Enviar</button>

                </div>

            </div>
 
        </form>

        <h2 id="dados"></h2>

    </div>
    
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script src="js/script.js"></script>

  </body>
</html>
