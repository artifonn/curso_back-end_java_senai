<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<title>Consumo de API</title>
</head>

<body>

	<div class="container mt-5">
		<h1>Formulário com API</h1>
		<hr>
		<form method="" class="mt-5">
			<div class="row">
				<div class="col-12 col-md-6 mb-3">
					<label for="nome" class="fom-label">Nome:</label>
					<input type="text" class="form-control" id="nome" required>
				</div>

				<div class="col-12 col-md-6 mb-3">
					<label for="email" class="fom-label">E-mail:</label>
					<input type="email" class="form-control" id="email" required>
				</div>

				<div class="col-12 col-md-4 mb-3">
					<label for="cpf" class="fom-label">CPF:</label>
					<input type="text" class="form-control" id="cpf" required>
				</div>

				<div class="col-12 col-md-4 mb-3">
					<label for="cep" class="fom-label">CEP:</label>
					<input type="text" class="form-control" id="cep" required>
				</div>

				<div class="col-12 col-md-4 col-lg-4 mb-3">
					<label for="estado" class="fom-label">Estado:</label>
					<input type="text" class="form-control" id="estado" required>
				</div>

				<div class="col-12 col-md-4 col-lg-3 mb-3">
					<label for="cidade" class="fom-label">Cidade:</label>
					<input type="text" class="form-control" id="cidade" required>
				</div>

				<div class="col-12 col-md-4 col-lg-3 mb-3">
					<label for="bairro" class="fom-label">Bairro:</label>
					<input type="text" class="form-control" id="bairro" required>
				</div>

				<div class="col-12 col-md-8 col-lg-3 mb-3">
					<label for="Logradorouro" class="fom-label">Logradorouro:</label>
					<input type="text" class="form-control" id="logradouro" required>
				</div>

				<div class="col-12 col-md-8 col-lg-3 mb-3">
					<label for="Numero" class="fom-label">Numero:</label>
					<input type="text" class="form-control" id="numero" required>
				</div>

				<div class="col-12 mb-3">
					<label for="Complemento" class="fom-label">Complemento:</label>
					<input type="text" class="form-control" id="complemento">
				</div>
				
				<div class="d-flex justify-content-end mt-s">
					<button type="button" class="btn btn-success">Enviar</button>
				</div>
			</div>
		</form>
		<h2 id="dados"></h2>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
		
	<script src="./js/script.js"></script>
</body>

</html>
