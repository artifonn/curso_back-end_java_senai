<!doctype html>
<html
  lang="pt-br"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="~{fragments/layout :: main-layout(~{::title}, ~{::main})}"
>
  <head>
    <title>JavaLanches - Cadastrar novo cliente</title>
  </head>

  <body>
    <main>
      <h1>Cadastrar novo endereço</h1>
      <hr />
      <form method="POST">
        <div class="container">
          <div class="row">
            <legend class="mt-3">Endereço</legend>
            <hr />

            <div class="col-12 col-mb-8 col-lg-4 mb-3">
              <label for="Cep" class="form-label">CEP</label>
              <input
                type="text"
                class="form-control"
                name="Cep"
                id="Cep"
                placeholder="Digite seu CEP"
                required
              />
            </div>
          </div>
        </div>

        <div class="container">
          <div class="row">
            <div class="col-12 col-mb-8 col-lg-4 mb-3">
              <label for="cidade" class="form-label">Cidade</label>
              <input
                type="text"
                class="form-control"
                name="cidade"
                id="cidade"
                required
              />
            </div>

            <div class="col-12 col-mb-8 col-lg-4 mb-3">
              <label for="uf" class="form-label">Uf</label>
              <input
                type="text"
                class="form-control"
                name="uf"
                id="uf"
                required
              />
            </div>

            <div class="col-12 col-mb-8 col-lg-4 mb-3">
              <label for="bairro" class="form-label"> Bairro </label>
              <input
                type="text"
                class="form-control"
                name="bairro"
                id="bairro"
                required
              />
            </div>

            <div class="col-12 col-mb-8 col-lg-4 mb-3">
              <label for="logradouro" class="form-label"> Logradouro </label>
              <input
                type="text"
                class="form-control"
                name="logradouro"
                id="logradouro"
                required
              />
            </div>

            <div class="col-12 col-mb-8 col-lg-2 mb-3">
              <label for="numero" class="form-label"> Número </label>
              <input
                type="number"
                class="form-control"
                name="numero"
                id="numero"
                required
                step="0.01"
              />
            </div>

            <div class="col-12 col-mb-8 col-lg-6 mb-3">
              <label for="complemento" class="form-label"> Complemento</label>
              <input
                type="text"
                class="form-control"
                name="complemento"
                id="complemento"
              />
            </div>

            <div class="d-flex justify-content-start">
              <button type="submit" class="btn btn-primary">
                Cadastrar Endereço
              </button>
            </div>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
