spring.application.name=04_javalanches

# configuração de conexão com SGDB MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_java_lanches
spring.datasource.username=root
spring.datasource.passaword=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# confifuração do Hibernate
# orm = object-relation model

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=upate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect