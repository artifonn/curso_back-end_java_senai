<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/layout :: main-layout(~{::title}, ~{::main})}">
<head>
    
    <title>Javalanches - Cadastrar novo produto </title>
</head>
<body>

    <main>
        <h1>Cadastro de novo Produto</h1>
        <hr>
        <form method="POST">
            <div class="row">

                <div class="col-12 col-lg-4 mb-3">
                    <label for="nomeProduto" class="form-label">Nome do Produto: </label>
                    <input type="text" class="form-control" id="nomeProduto"
                    name="nomeProduto" required>

                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label for="categoriaId" class="form-label">Categoria: </label>

                    <select class="form-select" id="categoriaId" name="categoriaId"
                    required>
                        <option value="" disabled selected>Selecione uma categoria...</option>
                        <option th:each="cat:${categorias}" th:value="${cat.codigoCategoria}" th:text="${cat.nomeCategoria}"></option>
                    </select>
                   
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label for="precoProduto" class="form-label">Preço do Produto: </label>
                    <input type="number" class="form-control" id="precoProduto"
                    name="precoProduto" required placeholder="R$ 0,00" step="0.01">

                </div>

                <div class="col-12 mb-3">

                    <label for="descricaoProduto" class="form-label"> Descrição do Produto: </label>
                    <textarea  class="form-control" id="descricaoProduto"
                    name="descricaoProduto" rows="3" placeholder="Numero máximo de caracteres: 255" maxlength="255">
                    </textarea>

                </div>

                <div class="d-flex justify-content-start">
                    <button type="submit" class="btn btn-primary">Cadastrar Produtos</button>

                </div>

                

            </div>
        </form>

    </main>
    
</body>
</html>
